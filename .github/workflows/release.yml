name: Release Extension

on:
    workflow_dispatch:
        inputs:
            version:
                description: Release version, for example 0.5.2
                required: true
                type: string

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Ensure tag does not already exist
              run: |
                  if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
                    echo "Tag v${{ inputs.version }} already exists."
                    exit 1
                  fi

            - name: Prepare release version
              run: node scripts/prepare-release.mjs --version "${{ inputs.version }}"

            - name: Build extension packages
              run: npm run package:all

            - name: Create release archives
              run: |
                  cd build/chrome
                  zip -r ../showdown-vgc-team-sheet-chrome-v${{ inputs.version }}.zip .
                  cd ../firefox
                  zip -r ../showdown-vgc-team-sheet-firefox-v${{ inputs.version }}.zip .

            - name: Commit release version
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add package.json package-lock.json manifest.json manifest.chrome.json manifest.firefox.json
                  git commit -m "chore: release v${{ inputs.version }}"
                  git tag "v${{ inputs.version }}"
                  git push origin HEAD:${{ github.ref_name }}
                  git push origin "v${{ inputs.version }}"

            - name: Publish GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ inputs.version }}
                  generate_release_notes: true
                  files: |
                      build/showdown-vgc-team-sheet-chrome-v${{ inputs.version }}.zip
                      build/showdown-vgc-team-sheet-firefox-v${{ inputs.version }}.zip
