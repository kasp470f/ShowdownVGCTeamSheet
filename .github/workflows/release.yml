name: Release Extension

on:
    workflow_dispatch:
        inputs:
            bump:
                description: Bump version (patch, minor, major)
                required: false
                type: choice
                options:
                    - patch
                    - minor
                    - major
            version:
                description: Release version override
                required: false
                type: string
            alpha:
                description: Mark release as alpha
                required: false
                type: boolean
            

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Determine release version
              id: version
              run: |
                  if [ -n "${{ inputs.version }}" ]; then
                    echo "Using provided version: ${{ inputs.version }}"
                    echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
                  else
                    if [ -n "${{ inputs.bump }}" ]; then
                      npm version ${{ inputs.bump }} --no-git-tag-version
                      NEW_VERSION=$(node -p "require('./package.json').version")
                      echo "Bumped version to: $NEW_VERSION"
                      echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
                    else
                      echo "No version bump or override provided. Using current version."
                      CURRENT_VERSION=$(node -p "require('./package.json').version")
                      echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
                    fi
                  fi

            - name: Ensure tag does not already exist
              run: |
                  if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
                    echo "Tag v${{ steps.version.outputs.version }} already exists."
                    exit 1
                  fi

            - name: Prepare release version
              run: node scripts/prepare-release.mjs --version "${{ steps.version.outputs.version }}"

            - name: Build extension packages
              run: npm run package:all

            - name: Create release archives
              run: |
                  cd build/chrome
                  zip -r ../showdown-vgc-team-sheet-chrome-v${{ steps.version.outputs.version }}.zip .
                  cd ../firefox
                  zip -r ../showdown-vgc-team-sheet-firefox-v${{ steps.version.outputs.version }}.zip .

            - name: Commit release version
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add package.json package-lock.json manifest.json manifest.chrome.json manifest.firefox.json
                  if ! git diff --cached --quiet; then
                    git commit -m "chore: release v${{ steps.version.outputs.version }}"
                  else
                    echo "No version file changes to commit."
                  fi
                  git tag "v${{ steps.version.outputs.version }}"
                  git push origin HEAD:${{ github.ref_name }}
                  git push origin "v${{ steps.version.outputs.version }}"

            - name: Publish GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  name: "Release v${{ steps.version.outputs.version }}"
                  tag_name: v${{ steps.version.outputs.version }}
                  prerelease: ${{ inputs.alpha == true }}
                  generate_release_notes: true
                  files: |
                      build/showdown-vgc-team-sheet-chrome-v${{ steps.version.outputs.version }}.zip
                      build/showdown-vgc-team-sheet-firefox-v${{ steps.version.outputs.version }}.zip
